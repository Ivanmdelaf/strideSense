services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpass
      POSTGRES_DB: nestdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./stridesense-backend
    container_name: nest_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: nestuser
      DATABASE_PASSWORD: nestpass
      DATABASE_NAME: nestdb
      DATABASE_URL: postgresql://nestuser:nestpass@db:5432/nestdb?schema=public
      JWT_SECRET: super-secret-key-change-in-production
      JWT_EXPIRATION: 86400
    ports:
      - "3000:3000"

  frontend:
    build: ./stridesense-frontend
    container_name: angular_frontend
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "4200:80"

volumes:
  postgres_data:
